name = "plae-api"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

# Local dev server
[dev]
port = 8787

# Secrets (set via `wrangler secret put <KEY>` for prod;
# `apps/api/.dev.vars` for local):
#   ANTHROPIC_API_KEY
#   HF_TOKEN
#   GOOGLE_OAUTH_CLIENT_ID

[vars]
ALLOWED_EMAIL_DOMAIN = ""
STRUDEL_DAILY_QUOTA = "30"
MUSICGEN_DAILY_QUOTA = "10"

# D1 database. For local dev, miniflare creates a SQLite file under
# `.wrangler/state/v3/d1/`. Production DB created via `wrangler d1 create plae-db`
# (region APAC).
[[d1_databases]]
binding = "DB"
database_name = "plae-db"
database_id = "c214b2ac-d9fd-4761-8f0e-0b722a892f1f"
migrations_dir = "migrations"
