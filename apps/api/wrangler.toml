name = "plae-api"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

# Local dev server
[dev]
port = 8787

# Secrets (set via `wrangler secret put <KEY>` for prod;
# `apps/api/.dev.vars` for local):
#   ANTHROPIC_API_KEY
#   HF_TOKEN
#   GOOGLE_OAUTH_CLIENT_ID

[vars]
ALLOWED_EMAIL_DOMAIN = ""
DAILY_QUOTA_PER_STUDENT = "30"

# D1 database. For local dev, miniflare creates a SQLite file under
# `.wrangler/state/v3/d1/`. For production, run:
#   wrangler d1 create plae-db
# and replace `database_id` below with the returned UUID.
[[d1_databases]]
binding = "DB"
database_name = "plae-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
